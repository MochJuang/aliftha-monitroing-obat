services:
  mariadb:
    image: mariadb:10.11
    container_name: gudang-obat-kb-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: gudang_obat_kb
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "root"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mariadb_data:
